services:
  - type: web
    name: whatsapp-inmobiliaria-mvp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      # DATABASE_URL: MySQL externo (mysql+pymysql://...). Ver docs/MYSQL_SETUP.md
